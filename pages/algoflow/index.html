    <style>
      .algoflow-algo-price {
        align-items: center;
        background:
          linear-gradient(135deg, rgba(5, 150, 105, 0.16), rgba(59, 130, 246, 0.12)),
          #0a091b;
        border-bottom: 1px solid rgba(45, 212, 191, 0.2);
        color: #e5e7eb;
        display: flex;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        justify-content: center;
        min-height: 48px;
        padding: 0.55rem 1rem;
        text-decoration: none;
        transition: background 0.18s ease, border-color 0.18s ease;
      }

      .algoflow-algo-price:hover {
        background:
          linear-gradient(135deg, rgba(5, 150, 105, 0.24), rgba(59, 130, 246, 0.18)),
          #0a091b;
        border-color: rgba(45, 212, 191, 0.36);
        text-decoration: none;
      }

      .algoflow-algo-price__dot {
        background: #2dd4bf;
        border-radius: 999px;
        box-shadow: 0 0 0 4px rgba(45, 212, 191, 0.12);
        flex: 0 0 auto;
        height: 0.5rem;
        margin-right: 0.6rem;
        width: 0.5rem;
      }

      .algoflow-algo-price__symbol {
        color: #e5e7eb;
        font-size: 0.82rem;
        font-weight: 900;
        letter-spacing: 0.08em;
        margin-right: 0.55rem;
        text-transform: uppercase;
      }

      .algoflow-algo-price__value {
        color: #2dd4bf;
        font-size: 1rem;
        font-weight: 900;
        letter-spacing: -0.01em;
      }

      .algoflow-algo-price__source {
        color: #9ca3af;
        font-size: 0.68rem;
        font-weight: 800;
        letter-spacing: 0.08em;
        margin-left: 0.65rem;
        text-transform: uppercase;
      }

      @media (max-width: 520px) {
        .algoflow-algo-price {
          justify-content: flex-start;
        }

        .algoflow-algo-price__source {
          display: none;
        }
      }

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",

    }

    <script type="module" crossorigin src="/pages/algoflow/assets/index-Dyq7g64I.js"></script>
    <script defer src="/pages/algoflow/shape-enhancement.js"></script>
    <link rel="stylesheet" crossorigin href="/pages/algoflow/assets/index-DD2NHsbe.css">
  </head>
  <body>
    <a class="algoflow-algo-price" href="https://coinmarketcap.com/currencies/algorand/" target="_blank" rel="noopener noreferrer" aria-label="View ALGO price on CoinMarketCap">
      <span class="algoflow-algo-price__dot" aria-hidden="true"></span>
      <span class="algoflow-algo-price__symbol">ALGO / AlgoFlow</span>
      <strong class="algoflow-algo-price__value" id="algoflow-algo-price-value">Loading price...</strong>
      <span class="algoflow-algo-price__source">View on CoinMarketCap</span>
    </a>
    <div id="root"></div>
    <script>
      (function () {
        var priceEl = document.getElementById("algoflow-algo-price-value");
        if (!priceEl || !window.fetch) {
          return;
        }
        fetch("https://api.coingecko.com/api/v3/simple/price?ids=algorand&vs_currencies=usd", {
          headers: { "accept": "application/json" },
        })
          .then(function (response) {
            if (!response.ok) throw new Error("price unavailable");
            return response.json();
          })
          .then(function (data) {
            var price = data && data.algorand && Number(data.algorand.usd);
            if (!Number.isFinite(price)) throw new Error("price unavailable");
            priceEl.textContent = "$" + price.toLocaleString("en-US", {
              minimumFractionDigits: price < 1 ? 4 : 2,
              maximumFractionDigits: price < 1 ? 4 : 2,
            });
          })
          .catch(function () {
            priceEl.textContent = "ALGO price";
          });
      })();
    </script>
  </body>
